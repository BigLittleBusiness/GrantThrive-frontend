name: GrantThrive Frontend AWS Deploy

on:
  push:
    branches:
      - staging
      - prod
  workflow_dispatch:
    inputs:
      target_env:
        description: Environment to deploy
        required: true
        type: choice
        options:
          - uat
          - prod

concurrency:
  group: frontend-aws-deploy-${{ github.event_name == 'workflow_dispatch' && inputs.target_env || github.ref_name }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-southeast-2
  TF_IN_AUTOMATION: "true"

jobs:
  deploy:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine target environment
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TARGET_ENV="${{ inputs.target_env }}"
          elif [[ "${{ github.ref_name }}" == "prod" ]]; then
            TARGET_ENV="prod"
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then
            TARGET_ENV="uat"
          else
            echo "Unsupported branch: ${{ github.ref_name }}" >&2
            exit 1
          fi

          if [[ "$TARGET_ENV" == "prod" ]]; then
            TFVARS="terraform.prod.tfvars"
            APP_URL="https://app.grantthrive.com"
          else
            TFVARS="terraform.uat.tfvars"
            APP_URL="https://app.uat.grantthrive.com"
          fi

          echo "TARGET_ENV=$TARGET_ENV" >> "$GITHUB_ENV"
          echo "TFVARS=$TFVARS" >> "$GITHUB_ENV"
          echo "APP_URL=$APP_URL" >> "$GITHUB_ENV"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.4.1

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate required Terraform variables file
        run: |
          test -f "terraform/${TFVARS}" || {
            echo "Missing terraform/${TFVARS}. Commit the env tfvars file or generate it before this step." >&2
            exit 1
          }

      - name: Terraform init
        run: terraform -chdir=terraform init

      - name: Select Terraform workspace
        run: terraform -chdir=terraform workspace select "$TARGET_ENV" || terraform -chdir=terraform workspace new "$TARGET_ENV"

      - name: Terraform validate
        run: terraform -chdir=terraform validate

      - name: Terraform apply
        run: terraform -chdir=terraform apply -auto-approve -var-file="$TFVARS"

      - name: Deploy frontend application
        run: ./scripts/deploy.sh "$TARGET_ENV"

      - name: Verify frontend
        run: curl -fsS -I "$APP_URL"
