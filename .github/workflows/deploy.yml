name: Build and Deploy GrantThrive Frontend

# Triggered on every push to main.
# Builds the single unified React app and deploys the dist/ output to EC2.
# Required GitHub Secrets:
#   EC2_SSH_KEY    — private SSH key for the EC2 instance
#   EC2_HOST       — public IP or hostname of the EC2 instance
#   EC2_USER       — SSH username (e.g. ubuntu)
#   VITE_API_URL   — full URL of the backend API (e.g. https://api.grantthrive.com/api)
#   VITE_LOGIN_URL — full URL of the login page (e.g. https://app.grantthrive.com/login)

on:
  push:
    branches: [main]

concurrency:
  group: deploy-frontend
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install dependencies
        run: pnpm install

      - name: Build unified app
        run: pnpm build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_LOGIN_URL: ${{ secrets.VITE_LOGIN_URL }}

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy dist/ to EC2
        run: |
          rsync -avz --delete \
            dist/ \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }}:/var/www/grantthrive/

      - name: Reload Nginx
        run: |
          ssh ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} "sudo systemctl reload nginx"
